<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IN e-Invoice: XML → JSON Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1e3a5f;
      color: white;
      padding: 13px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
    header .sub { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    header .badge {
      background: rgba(255,255,255,0.13);
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 14px;
      overflow: hidden;
      min-height: 0;
    }

    .panel {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-hdr {
      padding: 9px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #475569;
      flex-shrink: 0;
    }

    .file-badge {
      font-size: 11px;
      color: #3b82f6;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Drop zone */
    .drop-zone {
      margin: 11px 11px 0;
      border: 2px dashed #cbd5e1;
      border-radius: 6px;
      padding: 13px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .drop-zone input { display: none; }
    .drop-zone .dz-icon { font-size: 20px; margin-bottom: 3px; }
    .drop-zone .dz-text { font-size: 12px; color: #64748b; }
    .drop-zone .dz-link { color: #3b82f6; text-decoration: underline; }

    textarea {
      flex: 1;
      margin: 10px 11px 0;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
      font-size: 11.5px;
      resize: none;
      outline: none;
      line-height: 1.5;
      color: #334155;
      min-height: 0;
    }
    textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }

    .input-actions {
      padding: 9px 11px;
      display: flex;
      gap: 7px;
      border-top: 1px solid #e2e8f0;
      margin-top: 10px;
      flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary { background: #1e3a5f; color: white; flex: 1; font-size: 13px; font-weight: 600; }
    .btn-primary:hover { background: #2d5986; }

    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #e2e8f0; }
    .btn-ghost:hover { background: #fef2f2; color: #ef4444; border-color: #fca5a5; }

    .btn-copy { background: #3b82f6; color: white; }
    .btn-copy:hover { background: #2563eb; }
    .btn-copy.copied { background: #10b981; }

    .btn-dl { background: #059669; color: white; }
    .btn-dl:hover { background: #047857; }

    /* Warnings */
    .warnings-area { padding: 0 11px; flex-shrink: 0; }
    .warnings-area:not(:empty) { padding-top: 9px; }

    .w-item {
      padding: 6px 9px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 4px;
      border-left: 3px solid;
      line-height: 1.4;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .w-item .wi { flex-shrink: 0; font-size: 12px; margin-top: 0.5px; }
    .w-warn  { background: #fffbeb; border-color: #f59e0b; color: #78350f; }
    .w-info  { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }
    .w-error { background: #fef2f2; border-color: #ef4444; color: #7f1d1d; }
    .w-ok    { background: #f0fdf4; border-color: #22c55e; color: #14532d; }

    /* Output */
    .output-scroll {
      flex: 1;
      overflow: auto;
      margin: 9px 11px 0;
      border: 1px solid #1e293b;
      border-radius: 6px;
      background: #1e293b;
      min-height: 0;
    }
    .output-scroll pre {
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 11.5px;
      line-height: 1.6;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-all;
      padding: 10px;
    }
    .placeholder {
      color: #475569;
      font-size: 12px;
      font-style: italic;
      font-family: -apple-system, sans-serif;
      text-align: center;
      padding: 50px 20px;
    }

    .output-actions {
      padding: 8px 11px;
      display: flex;
      gap: 7px;
      border-top: 1px solid #e2e8f0;
      align-items: center;
      flex-shrink: 0;
      margin-top: 9px;
    }
    .output-stats { flex: 1; font-size: 11px; color: #94a3b8; }

    /* JSON syntax colours */
    .jk { color: #7dd3fc; }
    .js { color: #86efac; }
    .jn { color: #fbbf24; }
    .jb { color: #f472b6; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>IN e-Invoice: XML → JSON Converter</h1>
    <div class="sub">Converts SAP eDocument XML to IRP / Tax Authority accepted format</div>
  </div>
  <span class="badge">IRP Schema v1.1</span>
</header>

<div class="workspace">

  <!-- INPUT PANEL -->
  <div class="panel">
    <div class="panel-hdr">
      <span>Input — SAP XML</span>
      <span class="file-badge" id="file-badge"></span>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept=".xml">
      <div class="dz-icon">📄</div>
      <div class="dz-text">Drop a <span class="dz-link">.xml file</span> here, or click to browse</div>
    </div>

    <textarea id="xml-input" placeholder="Or paste the SAP eDocument XML here..."></textarea>

    <div class="input-actions">
      <button class="btn btn-primary" onclick="convert()">Convert →</button>
      <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel">
    <div class="panel-hdr">
      <span>Output — Tax Authority JSON</span>
    </div>

    <div class="warnings-area" id="warnings-area"></div>

    <div class="output-scroll" id="output-scroll">
      <div class="placeholder">Converted JSON will appear here</div>
    </div>

    <div class="output-actions">
      <span class="output-stats" id="output-stats"></span>
      <button class="btn btn-copy" id="btn-copy" onclick="copyJson()" style="display:none">Copy JSON</button>
      <button class="btn btn-dl"   id="btn-dl"   onclick="downloadJson()" style="display:none">Download .json</button>
    </div>
  </div>

</div>

<script>
  "use strict";

  let lastResult    = null;
  let sourceFileName = "invoice";

  // ── Drag & Drop / File Load ──────────────────────────────────────────
  const dropZone  = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");

  dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("over"); });
  dropZone.addEventListener("dragleave", ()  => dropZone.classList.remove("over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("over");
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    sourceFileName = file.name.replace(/\.xml$/i, "");
    document.getElementById("file-badge").textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => { document.getElementById("xml-input").value = e.target.result; };
    reader.readAsText(file);
  }

  // ── Clear ────────────────────────────────────────────────────────────
  function clearAll() {
    document.getElementById("xml-input").value    = "";
    document.getElementById("file-badge").textContent = "";
    document.getElementById("warnings-area").innerHTML = "";
    document.getElementById("output-scroll").innerHTML = '<div class="placeholder">Converted JSON will appear here</div>';
    document.getElementById("output-stats").textContent = "";
    document.getElementById("btn-copy").style.display = "none";
    document.getElementById("btn-dl").style.display   = "none";
    lastResult = null;
    fileInput.value = "";
  }

  // ── XML DOM Helpers ──────────────────────────────────────────────────
  function getChild(parent, name) {
    for (const c of parent.children)
      if (c.localName === name) return c;
    return null;
  }

  function getText(parent, name) {
    const el = getChild(parent, name);
    return el ? el.textContent.trim() : null;
  }

  function getChildren(parent, name) {
    return Array.from(parent.children).filter(c => c.localName === name);
  }

  function toFloat(val) { return parseFloat((val || "0").trim()) || 0; }
  function toInt(val)   { return parseInt((val || "0").trim(), 10) || 0; }

  // ── Transformation Logic ─────────────────────────────────────────────
  function transformXml(xmlStr) {
    const doc = new DOMParser().parseFromString(xmlStr, "text/xml");
    const parseErr = doc.querySelector("parsererror");
    if (parseErr) throw new Error("XML parse error — " + parseErr.textContent.substring(0, 150));

    const root    = doc.documentElement;
    const docData = getChild(root, "docData");
    if (!docData) throw new Error("<docData> element not found. Is this a SAP eDocument XML?");

    const warnings = [];

    // ── Version ────────────────────────────────────────────────────────
    const version = getText(docData, "Version") || "1.1";

    // ── TranDtls ───────────────────────────────────────────────────────
    const tranEl = getChild(docData, "TranDtls");
    if (!tranEl) throw new Error("<TranDtls> not found in XML");

    // ── DocDtls ────────────────────────────────────────────────────────
    const docEl = getChild(docData, "DocDtls");
    if (!docEl) throw new Error("<DocDtls> not found in XML");

    // ── SellerDtls ─────────────────────────────────────────────────────
    const selEl = getChild(docData, "SellerDtls");
    if (!selEl) throw new Error("<SellerDtls> not found in XML");

    const selGstin = getText(selEl, "Gstin") || "";
    const selStcd  = getText(selEl, "Stcd")  || "";
    if (selGstin.substring(0, 2) !== selStcd) {
      warnings.push({ t: "w", m: `Seller: GSTIN state prefix (${selGstin.substring(0,2)}) ≠ Stcd (${selStcd}) — verify source data` });
    }

    // ── BuyerDtls ──────────────────────────────────────────────────────
    const buyEl = getChild(docData, "BuyerDtls");
    if (!buyEl) throw new Error("<BuyerDtls> not found in XML");

    const buyGstin = getText(buyEl, "Gstin") || "";
    const buyStcd  = getText(buyEl, "Stcd")  || "";
    if (buyGstin.substring(0, 2) !== buyStcd) {
      warnings.push({ t: "w", m: `Buyer: GSTIN state prefix (${buyGstin.substring(0,2)}) ≠ Stcd (${buyStcd}) — verify source data` });
    }

    // ── ItemList ───────────────────────────────────────────────────────
    const itemEls = getChildren(docData, "ItemList");
    if (!itemEls.length) throw new Error("<ItemList> not found in XML");

    const ItemList = itemEls.map(item => ({
      SlNo:       getText(item, "SlNo"),
      IsServc:    getText(item, "IsServc"),
      HsnCd:      getText(item, "HsnCd"),
      Qty:        toFloat(getText(item, "Qty")),
      Unit:       getText(item, "Unit"),
      UnitPrice:  toFloat(getText(item, "UnitPrice")),
      TotAmt:     toFloat(getText(item, "TotAmt")),
      AssAmt:     toFloat(getText(item, "AssAmt")),
      GstRt:      toFloat(getText(item, "GstRt")),
      IgstAmt:    toFloat(getText(item, "IgstAmt")),
      CgstAmt:    toFloat(getText(item, "CgstAmt")),
      SgstAmt:    toFloat(getText(item, "SgstAmt")),
      CesAmt:     toFloat(getText(item, "CesAmt")),
      OthChrg:    toFloat(getText(item, "OthChrg")),
      TotItemVal: toFloat(getText(item, "TotItemVal"))
    }));

    // ── ValDtls ────────────────────────────────────────────────────────
    const valEl = getChild(docData, "ValDtls");
    if (!valEl) throw new Error("<ValDtls> not found in XML");

    const xmlOthChrg  = toFloat(getText(valEl, "OthChrg"));
    const calcOthChrg = Math.round(ItemList.reduce((s, it) => s + it.OthChrg, 0) * 100) / 100;

    if (Math.abs(calcOthChrg - xmlOthChrg) > 0.005) {
      warnings.push({
        t: "w",
        m: `ValDtls/OthChrg corrected: XML = ${xmlOthChrg.toFixed(2)} → recalculated from items = ${calcOthChrg.toFixed(2)}`
      });
    }

    // ── Track dropped sections ─────────────────────────────────────────
    const droppedSections = [];
    if (getChild(root, "HeaderData"))    droppedSections.push("HeaderData");
    if (getChild(docData, "DispDtls"))   droppedSections.push("DispDtls");
    if (getChild(docData, "RefDtls"))    droppedSections.push("RefDtls");
    if (droppedSections.length) {
      warnings.push({ t: "i", m: "Sections dropped (not in IRP format): " + droppedSections.join(", ") });
    }

    // Track dropped item fields
    const droppableItemFields = ["PrdDesc","Discount","PreTaxVal","CesRt",
      "CesNonAdvlAmt","StateCesAmt","StateCesNonAdvlAmt","CgstRt","SgstRt","IgstRt","CesNonAdval"];
    const droppedItemFields = droppableItemFields.filter(f =>
      itemEls.some(el => getText(el, f) !== null)
    );
    if (droppedItemFields.length) {
      warnings.push({ t: "i", m: "Item fields dropped (not in IRP format): " + droppedItemFields.join(", ") });
    }

    // Track dropped party fields
    const droppedParty = ["TrdNm","Addr2"].filter(f =>
      getText(selEl, f) !== null || getText(buyEl, f) !== null
    );
    if (droppedParty.length) {
      warnings.push({ t: "i", m: "Party fields dropped (not in IRP format): " + droppedParty.join(", ") });
    }

    // ValDtls: StCesVal
    if (getText(valEl, "StCesVal") !== null) {
      warnings.push({ t: "i", m: "ValDtls/StCesVal dropped (not in IRP format)" });
    }

    const totalDropped = droppedSections.length + droppedItemFields.length + droppedParty.length
                        + (getText(valEl, "StCesVal") !== null ? 1 : 0);

    warnings.push({ t: "ok", m: `Conversion successful — ${itemEls.length} line item(s), ${totalDropped} field(s) dropped` });

    // ── Build output ───────────────────────────────────────────────────
    const result = [{
      Version: version,
      TranDtls: {
        TaxSch: getText(tranEl, "TaxSch"),
        SupTyp:  getText(tranEl, "SupTyp"),
        RegRev:  getText(tranEl, "RegRev")
      },
      DocDtls: {
        Typ: getText(docEl, "Typ"),
        No:  getText(docEl, "No"),
        Dt:  getText(docEl, "Dt")
      },
      SellerDtls: {
        Gstin: selGstin,
        LglNm: getText(selEl, "LglNm"),
        Addr1: getText(selEl, "Addr1"),
        Loc:   getText(selEl, "Loc"),
        Pin:   toInt(getText(selEl, "Pin")),
        Stcd:  selStcd
      },
      BuyerDtls: {
        Gstin: buyGstin,
        LglNm: getText(buyEl, "LglNm"),
        Pos:   getText(buyEl, "Pos"),
        Addr1: getText(buyEl, "Addr1"),
        Loc:   getText(buyEl, "Loc"),
        Pin:   toInt(getText(buyEl, "Pin")),
        Stcd:  buyStcd
      },
      ItemList,
      ValDtls: {
        AssVal:    toFloat(getText(valEl, "AssVal")),
        CgstVal:   toFloat(getText(valEl, "CgstVal")),
        SgstVal:   toFloat(getText(valEl, "SgstVal")),
        IgstVal:   toFloat(getText(valEl, "IgstVal")),
        CesVal:    toFloat(getText(valEl, "CesVal")),
        Discount:  toFloat(getText(valEl, "Discount")),
        OthChrg:   calcOthChrg,
        RndOffAmt: toFloat(getText(valEl, "RndOffAmt")),
        TotInvVal: toFloat(getText(valEl, "TotInvVal"))
      }
    }];

    return { result, warnings, stats: { items: itemEls.length, dropped: totalDropped } };
  }

  // ── JSON Syntax Highlighting ─────────────────────────────────────────
  function highlightJson(json) {
    return json
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(
        /("(?:\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        match => {
          if (/^".*":$/.test(match)) return `<span class="jk">${match}</span>`;
          if (/^"/.test(match))       return `<span class="js">${match}</span>`;
          if (/true|false/.test(match)) return `<span class="jb">${match}</span>`;
          return `<span class="jn">${match}</span>`;
        }
      );
  }

  // ── Convert ──────────────────────────────────────────────────────────
  function convert() {
    const xml = document.getElementById("xml-input").value.trim();
    if (!xml) { showError("Paste XML content or drop a file first."); return; }

    try {
      const { result, warnings, stats } = transformXml(xml);
      lastResult = result;

      // Render warnings
      const wArea = document.getElementById("warnings-area");
      wArea.innerHTML = warnings.map(w => {
        const cls  = { w:"w-warn", i:"w-info", ok:"w-ok", e:"w-error" }[w.t] || "w-info";
        const icon = { w:"⚠", i:"ℹ", ok:"✓", e:"✖" }[w.t] || "ℹ";
        return `<div class="w-item ${cls}"><span class="wi">${icon}</span><span>${w.m}</span></div>`;
      }).join("");

      // Render JSON
      const jsonStr = JSON.stringify(result, null, 2);
      document.getElementById("output-scroll").innerHTML = `<pre>${highlightJson(jsonStr)}</pre>`;

      // Stats & buttons
      document.getElementById("output-stats").textContent =
        `${stats.items} item(s) · ${stats.dropped} field(s) removed`;
      document.getElementById("btn-copy").style.display = "";
      document.getElementById("btn-dl").style.display   = "";

    } catch (err) {
      showError(err.message);
    }
  }

  function showError(msg) {
    document.getElementById("warnings-area").innerHTML =
      `<div class="w-item w-error" style="margin-top:9px"><span class="wi">✖</span><span>${msg}</span></div>`;
    document.getElementById("output-scroll").innerHTML =
      '<div class="placeholder">Fix the error above and try again</div>';
    document.getElementById("btn-copy").style.display = "none";
    document.getElementById("btn-dl").style.display   = "none";
    lastResult = null;
  }

  // ── Copy ─────────────────────────────────────────────────────────────
  function copyJson() {
    if (!lastResult) return;
    navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2)).then(() => {
      const btn = document.getElementById("btn-copy");
      btn.textContent = "Copied ✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Copy JSON"; btn.classList.remove("copied"); }, 2000);
    });
  }

  // ── Download ──────────────────────────────────────────────────────────
  function downloadJson() {
    if (!lastResult) return;
    const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = sourceFileName + "_irp.json";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  // Allow Enter key on Convert button
  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") convert();
  });
</script>

</body>
</html>
